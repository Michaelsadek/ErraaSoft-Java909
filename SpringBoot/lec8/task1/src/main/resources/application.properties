spring.application.name=lec8-task1

# Update these Oracle values if your local database uses a different host, service name, or credentials.
spring.datasource.url=${ORACLE_DB_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
spring.datasource.username=${ORACLE_DB_USERNAME:system}
spring.datasource.password=${ORACLE_DB_PASSWORD:oracle}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.open-in-view=false
